# ── 公司名称模式 ──────────────────────────
company_name_patterns:
  # 中文公司名称
  chinese:
    - pattern: "[\u4e00-\u9fff]{2,}(?:公司|集团|股份|科技|电子|半导体|设备|材料|光电)"
      min_length: 2
  
  # 英文公司名称
  english:
    - pattern: "[A-Z][a-zA-Z]+(?:Inc|Corp|Ltd|Co|Technologies|Semiconductor)"
      min_length: 3
  
  # A股股票代码
  a_share:
    - pattern: "[036]\\d{5}"
      min_length: 6
  
  # 美股代码
  us_stock:
    - pattern: "[A-Z]{1,5}"
      min_length: 1
      max_length: 5

# ── 问题模式 ──────────────────────────
question_patterns:
  - pattern: "国产化率.*?达到.*?(\\d+)%"
    template: "国产化率达到{}%"
  
  - pattern: "产能.*?提升.*?(\\d+)%"
    template: "产能提升{}%"
  
  - pattern: "营收.*?增长.*?(\\d+)%"
    template: "营收增长{}%"
  
  - pattern: "获得.*?订单"
    template: "获得新订单"
  
  - pattern: "发布.*?新品"
    template: "发布新品"
  
  - pattern: "突破.*?技术"
    template: "技术突破"
  
  - pattern: "客户.*?验证"
    template: "客户验证通过"
  
  - pattern: "量产.*?([\\u4e00-\u9fff]+)"
    template: "{}量产"

# ── 低质量来源过滤 ──────────────────────────
low_quality_sources:
  # URL 黑名单
  url_patterns:
    - "quote.eastmoney.com"
    - "quote.futunn.com"
    - "xueqiu.com/S/"
    - "stock_quote"
    - "baidu.com/baike"
    - "baike.baidu.com"
    - "hq.sinajs.cn"
    - "finance.sina.com.cn/realstock"
  
  # 标题黑名单
  title_patterns:
    - "行情走势"
    - "股票股价"
    - "最新价格"
    - "实时走势图"
    - "公司简介"
    - "股票行情中心"
    - "百科"
    - "百度百科"
    - "最新新闻"
    - "最新资讯"
    - "个股资讯"

# ── 噪音过滤 ──────────────────────────
noise_patterns:
  # 导航/菜单
  - "^(关于|产品|支持|联系|服务|首页|导航|菜单|公司简介|版权所有)"
  - "^(Company|Products|Support|Contact|About|Menu|Navigation)"
  
  # 网站元素
  - "(登录|注册|搜索|订阅|分享|收藏|点赞|评论区|版权所有|版权声明)"
  - "(Copyright|All rights reserved|Terms of Service|Privacy Policy)"
  - "(备案号|ICP备|增值电信|互联网新闻信息服务)"
  
  # 股票行情
  - "^\\|?\\s*(开盘价|昨收盘|最高|最低|换手率|振幅|成交额|市盈率|市净率)"
  - "^\\|?\\s*(日期|两融余额|融资余额|环比|占流通市值)"
  
  # 重复分隔符
  - "^[\\s\\-_=*#]{10,}$"
  - "^[\\|:\\s]+$"