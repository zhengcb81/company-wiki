# ============================================
# 分类和发现规则配置
# ============================================
# 将硬编码的规则提取到配置文件中，便于维护和扩展

# ── 文档分类规则 ──────────────────────────
document_classification:
  # 年报
  annual_report:
    patterns:
      - "年年度报告"
      - "年年报"
    confidence: 0.95
    target_dir: "financial_reports/annual"
  
  # 半年报
  semi_annual_report:
    patterns:
      - "半年度报告"
      - "半年报"
    confidence: 0.95
    target_dir: "financial_reports/semi_annual"
  
  # 季报
  quarterly_report:
    patterns:
      - "第[一二三四]季度报告"
      - "季报"
      - "一季度报告"
      - "二季度报告"
      - "三季度报告"
      - "四季度报告"
    confidence: 0.95
    target_dir: "financial_reports/quarterly"
  
  # 招股说明书
  prospectus:
    patterns:
      - "招股说明书"
      - "招股意向书"
    confidence: 0.95
    target_dir: "prospectus"
  
  # 投资者关系
  investor_relations:
    patterns:
      - "投资者关系"
      - "投资者交流"
      - "投资者问答"
      - "投资者关系活动记录"
      - "投资者关系管理"
    confidence: 0.95
    target_dir: "investor_relations"
  
  # 研报
  research:
    patterns:
      - "研报"
      - "深度报告"
      - "点评报告"
      - "跟踪报告"
    confidence: 0.85
    target_dir: "research"
  
  # 公告
  announcement:
    patterns:
      - "公告"
      - "决议"
      - "通知"
      - "提示"
    confidence: 0.80
    target_dir: "announcements"
  
  # 新闻
  news:
    file_extensions:
      - ".md"
    confidence: 0.70
    target_dir: "news"

