# ============================================
# 上市公司知识库 — 运维配置
# ============================================
# 业务数据（公司、行业、主题、拓扑关系）在 graph.yaml 中。
# 本文件只包含 API 密钥、调度、路径等运维设置。

# ── 调度配置 ──────────────────────────────
schedule:
  news_collection: "daily"
  report_check: "weekly"
  lint: "weekly"
  maintenance: "weekly"    # 运行 python scripts/maintenance.py --all

# ── LLM 配置 ──────────────────────────────
# api_key 从环境变量 DEEPSEEK_API_KEY 读取，不在此处设置
llm:
  provider: "deepseek"
  model: "deepseek-reasoner"
  base_url: "https://api.deepseek.com"
  max_tokens: 1024
  temperature: 0.3

# ── 搜索配置 ──────────────────────────────
# tavily_api_key 从环境变量 TAVILY_API_KEY 读取，不在此处设置
search:
  engine: "tavily"
  results_per_query: 8
  language: "zh"
  max_age_days: 7

# ── StockInfoDownloader 配置 ──────────────
report_downloader:
  tool_path: "~/StockInfoDownloader"
  save_dir: "~/company-wiki/companies"
  browser_strategy: "playwright"
  pages:
    - name: "定期报告"
      suffix: "periodicReports"
      allowed_keywords: null
      max_pages: 10
    - name: "招股说明书"
      suffix: "latestAnnouncement"
      allowed_keywords: ["招股说明书", "上市招股说明书"]
      max_pages: 3
      reverse_order: true
    - name: "投资者关系"
      suffix: "research"
      allowed_keywords: ["投资者关系活动记录表", "投资者关系管理信息", "调研活动"]
      max_pages: 10

# ── 进化机制 ──────────────────────────────
evolution:
  auto_discover_topics: true
  suggest_companies: true
  evolve_questions: true

# ── 路径配置 ──────────────────────────────
paths:
  wiki_root: "~/company-wiki"
