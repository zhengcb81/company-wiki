site_name: "上市公司知识库"
site_description: "基于 LLM Wiki 模式的上市公司研究知识库"
copyright: "Copyright &copy; 2026"

# 构建目录
docs_dir: docs
site_dir: dist

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    logo: material/book-open-page-variant

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'
  - tags:
      tags_file: tags.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - meta
  - tables
  - admonition
  - attr_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com
  generator: false

